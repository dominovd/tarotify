<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Deep navy radial background with subtle centre lift -->
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1c1c3e"/>
      <stop offset="100%" stop-color="#07071a"/>
    </radialGradient>

    <!-- Soft gold halo behind the star -->
    <radialGradient id="glow" cx="50%" cy="50%" r="38%">
      <stop offset="0%"   stop-color="#c9a84c" stop-opacity="0.42"/>
      <stop offset="55%"  stop-color="#c9a84c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>

    <!-- Vertical gold gradient on the star body — gives subtle metallic feel -->
    <linearGradient id="goldStar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f1d57a"/>
      <stop offset="55%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8c6e15"/>
    </linearGradient>
  </defs>

  <!-- 1. Base background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- 2. Ambient gold halo -->
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- 3. Outer ornamental ring (very subtle) -->
  <circle cx="256" cy="256" r="208" fill="none"
          stroke="#c9a84c" stroke-opacity="0.28" stroke-width="1"/>

  <!-- 4. Inner ring (whisper) -->
  <circle cx="256" cy="256" r="178" fill="none"
          stroke="#c9a84c" stroke-opacity="0.12" stroke-width="1"/>

  <!-- 5. Compass star (four-pointed, ✦) — outer r=180, inner r=58 -->
  <polygon
    points="256,76 300,212 436,256 300,300 256,436 212,300 76,256 212,212"
    fill="url(#goldStar)"
    stroke="#e8c96a"
    stroke-opacity="0.55"
    stroke-width="1.2"
    stroke-linejoin="round"/>

  <!-- 6. Cardinal dots on the outer ring (art-nouveau accent) -->
  <circle cx="256" cy="48"  r="3.5" fill="#c9a84c"/>
  <circle cx="464" cy="256" r="3.5" fill="#c9a84c"/>
  <circle cx="256" cy="464" r="3.5" fill="#c9a84c"/>
  <circle cx="48"  cy="256" r="3.5" fill="#c9a84c"/>
</svg>
